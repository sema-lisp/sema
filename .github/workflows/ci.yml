name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  playground-runtime:
    permissions:
      contents: read
    uses: ./.github/workflows/playground-runtime.yml

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        # libudev-dev is required by `serialport` (transitive `libudev-sys`)
        # on Linux. The release workflow installs this via cargo-dist's
        # apt dependency hook (see dist-workspace.toml); CI needs to do it
        # explicitly.
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Smart Rust cache (partial-restores across Cargo.lock changes) instead of
      # the old exact-match key that cold-rebuilt the whole workspace each time.
      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install jake
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/HelgeSverre/jake/releases/latest/download/jake-linux-x86_64 -o "$HOME/.local/bin/jake"
          chmod +x "$HOME/.local/bin/jake"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Verify jake
        run: jake --version

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Check builtin docs (committed index fresh + fully documented)
        run: jake docs-check

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run --workspace --profile ci

      - name: Smoke test examples
        run: jake examples

      - name: Smoke test bytecode
        run: jake smoke-bytecode

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # Windows leg (advisory until first green, then drop continue-on-error and
  # treat as required). The nextest `ci` profile's slow-timeout
  # (120s x terminate-after 3) is the hang watchdog: a wedged async-runtime
  # test surfaces as a terminated slow test, not a silent 6h job. Known
  # platform limitation: subprocess eager-cancel (`group_sigkill_abort`) is a
  # documented no-op off Unix, so cancel tests that assert child teardown are
  # expected to need `cfg(unix)` gating in the first fix wave.
  test-windows:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run --workspace --profile ci
