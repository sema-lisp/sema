name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        # libudev-dev is required by `serialport` (transitive `libudev-sys`)
        # on Linux. The release workflow installs this via cargo-dist's
        # apt dependency hook (see dist-workspace.toml); CI needs to do it
        # explicitly.
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Smart Rust cache (partial-restores across Cargo.lock changes) instead of
      # the old exact-match key that cold-rebuilt the whole workspace each time.
      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Check builtin docs (committed index fresh + fully documented)
        run: make docs-check

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run --workspace --profile ci

      - name: Smoke test examples
        run: make examples

      - name: Smoke test bytecode
        run: make smoke-bytecode

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
