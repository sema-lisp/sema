name: Publish to npm

# NOTE: npm Trusted Publishing (OIDC) whitelists this workflow's *filename*. Keep npm
# publishing in `publish-npm.yml` — moving it into another file breaks the OIDC match
# (the publish 404s with "you do not have permission"). crates.io uses a token, so it
# lives separately in `publish.yml`.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # allow re-publishing against main (version read from Cargo.toml)

jobs:
  # Gate: tests/lint/examples must pass before publishing to npm.
  verify:
    uses: ./.github/workflows/verify.yml

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v6
        with:
          # Node 24 bundles npm 11.x — supports `--provenance` and trusted
          # publishing. Earlier runner images (Node 22.22.2) shipped a
          # corrupted bundled npm whose `arborist` was missing `promise-retry`,
          # making both `npm install -g npm@latest` and `npm publish` fail.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm is functional
        run: |
          node --version
          npm --version

      - name: Determine version
        id: version
        run: |
          # Tag push uses the tag; workflow_dispatch (recovery) reads Cargo.toml.
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            v=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
            echo "version=$v" >> "$GITHUB_OUTPUT"
          fi

      - name: Build WASM package
        run: |
          wasm-pack build crates/sema-wasm \
            --target web \
            --release \
            --scope sema-lang \
            --out-dir ../../packages/sema-wasm/pkg

      - name: Prepare sema-wasm package
        working-directory: packages/sema-wasm/pkg
        run: |
          # wasm-pack generates package.json; update version to match tag
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version
          # Copy README
          cp ../README.md .

      - name: Publish @sema-lang/sema-wasm
        working-directory: packages/sema-wasm/pkg
        run: npm publish --provenance --access public || echo "Already published, skipping"

      - name: Wait for npm registry propagation
        run: |
          echo "Waiting for @sema-lang/sema-wasm@${{ steps.version.outputs.version }} to propagate..."
          for i in $(seq 1 30); do
            if npm view "@sema-lang/sema-wasm@${{ steps.version.outputs.version }}" version 2>/dev/null; then
              echo "Package available on registry"
              exit 0
            fi
            echo "Attempt $i/30 - not yet available, waiting 10s..."
            sleep 10
          done
          echo "Package not found after 5 minutes"
          exit 1

      - name: Build wrapper package
        working-directory: packages/sema
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version
          # Update dependency version to match
          node -e "
            const pkg = require('./package.json');
            pkg.dependencies['@sema-lang/sema-wasm'] = '^${{ steps.version.outputs.version }}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm install
          npm run build

      - name: Publish @sema-lang/sema
        working-directory: packages/sema
        run: npm publish --provenance --access public || echo "Already published, skipping"

      # Standalone TS packages — version-locked to the workspace release, built and
      # published with provenance via the same OIDC trusted publisher.
      - name: Publish @sema-lang/llm-proxy
        working-directory: packages/llm-proxy
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version
          npm install
          npm run build
          npm publish --provenance --access public || echo "Already published, skipping"

      - name: Publish @sema-lang/sema-web
        working-directory: packages/sema-web
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version
          npm install
          npm run build
          npm publish --provenance --access public || echo "Already published, skipping"
