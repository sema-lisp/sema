# Publish all crates to crates.io when a version tag is pushed. (npm packages are
# published by publish-npm.yml — kept separate because npm Trusted Publishing's OIDC
# whitelist is keyed to the workflow *filename*.)
#
# Usage:
#   1. Bump the version in Cargo.toml (workspace.package.version + dependency pins)
#   2. Commit and push
#   3. Tag and push:  git tag v1.6.2 && git push origin v1.6.2
#
# Recover a partially-failed publish:  re-run via workflow_dispatch against main
# (the publish step is idempotent — already-published crates are skipped).
#
# Setup: crates.io API token -> secret CARGO_REGISTRY_TOKEN.

name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # allow re-running a partially-failed publish against main

jobs:
  # A red suite blocks the publish.
  verify:
    uses: ./.github/workflows/verify.yml

  publish-crates:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      # sema-stdlib pulls in serialport -> libudev-sys, whose `cargo publish`
      # verify-build needs libudev. Without this the last three crates fail to
      # publish (and the old loop masked it as "already published").
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e

          # Idempotent: skip crates already on crates.io, but FAIL LOUDLY on any
          # other error (a real publish failure must not look like success).
          # `cargo publish` already blocks until the new version is available on
          # the index, so we only add a tiny buffer before the next crate.
          publish() {
            echo "Publishing $1..."
            out=$(cargo publish -p "$1" 2>&1) && { echo "$out"; sleep 5; return 0; }
            if echo "$out" | grep -qiE "already (uploaded|exists)"; then
              echo "$1 already published, skipping"
            else
              echo "$out"
              echo "::error::Publishing $1 failed"
              exit 1
            fi
          }

          # Dependency order: a crate's path-deps must already be on crates.io.
          publish sema-core
          publish sema-io
          publish sema-reader
          publish sema-vm
          publish sema-otel
          publish sema-workflow
          publish sema-llm
          publish sema-stdlib
          publish sema-eval
          publish sema-docs
          publish sema-fmt
          publish sema-dap
          publish sema-notebook
          publish sema-lsp
          publish sema-mcp
          publish sema-lang
