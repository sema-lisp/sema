# Publish all crates to crates.io when a version tag is pushed.
#
# Usage:
#   1. Bump the version in Cargo.toml (workspace.package.version + dependency pins)
#   2. Commit and push
#   3. Tag and push:  git tag v1.6.2 && git push origin v1.6.2
#
# Setup:
#   Add your crates.io API token as a secret named CARGO_REGISTRY_TOKEN in
#   github.com/helgesverre/sema → Settings → Secrets → Actions
#
# The crates are published in dependency order with delays between each
# to avoid crates.io rate limits and allow index propagation.

name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # allow re-running a partially-failed publish against main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      # sema-stdlib pulls in serialport -> libudev-sys, whose `cargo publish`
      # verify-build needs libudev. Without this the last three crates fail to
      # publish (and the old loop masked it as "already published").
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e

          # Idempotent: skip crates already on crates.io, but FAIL LOUDLY on any
          # other error (a real publish failure must not look like success).
          publish() {
            echo "Publishing $1..."
            out=$(cargo publish -p "$1" 2>&1) && { echo "$out"; echo "Waiting for $1 to propagate..."; sleep 30; return 0; }
            if echo "$out" | grep -qiE "already (uploaded|exists)"; then
              echo "$1 already published, skipping"
            else
              echo "$out"
              echo "::error::Publishing $1 failed"
              exit 1
            fi
          }

          # Dependency order: a crate's path-deps must already be on crates.io.
          publish sema-core
          publish sema-reader
          publish sema-vm
          publish sema-llm
          publish sema-stdlib
          publish sema-eval
          publish sema-docs
          publish sema-fmt
          publish sema-dap
          publish sema-notebook
          publish sema-lsp
          publish sema-mcp
          publish sema-lang
