# Reusable verification gate — the same correctness checks CI runs, callable from
# the publish workflows so a release can NEVER ship when tests are red.
# (CI runs on branch pushes; the tag-triggered publishes call this to gate.)
name: Verify

on:
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Smart Rust cache: derives its key from the toolchain + Cargo.lock and
      # partial-restores on changes (vs. the old exact-match key that cold-rebuilt
      # the whole workspace whenever Cargo.lock moved — i.e. every release).
      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install jake
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/HelgeSverre/jake/releases/latest/download/jake-linux-x86_64 -o "$HOME/.local/bin/jake"
          chmod +x "$HOME/.local/bin/jake"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Verify jake
        run: jake --version

      # Gate the publish on a complete crate list: every publishable workspace
      # crate must be in publish.yml's order, so a release can't half-publish on a
      # newly-added crate (as happened with sema-otel in 1.22.0).
      - name: Check publish list is complete
        run: ./scripts/check-publish-list.sh

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Check builtin docs
        run: jake docs-check

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run --workspace --profile ci

      - name: Smoke test packaged web runtime
        run: ./scripts/test-packaged-sema-web.sh

      - name: Smoke test examples
        run: jake examples

      - name: Smoke test bytecode
        run: jake smoke-bytecode

  # Rebuild the embedded `sema web` browser runtime from source and fail if the
  # committed copy drifted — so a stale or unbuildable wasm can NEVER be
  # published. The runtime under crates/sema/src/web/assets is a checked-in
  # generated artifact; this is the standard "generated files are up to date"
  # gate. The toolchain is PINNED so the rebuild is byte-reproducible: when you
  # regenerate the runtime, use these same versions (rustc 1.97, wasm-pack 0.15,
  # wasm-bindgen via Cargo.lock, `npm ci`) and bump the pins here together.
  # In-browser behavior of the runtime is covered by sema-web-tests.yml
  # (Playwright) — make that a required check for full "never ship broken" cover.
  web-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust (pinned) + wasm target
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci

      - name: Install pinned wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.15.0

      - name: Install jake
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/HelgeSverre/jake/releases/latest/download/jake-linux-x86_64 -o "$HOME/.local/bin/jake"
          chmod +x "$HOME/.local/bin/jake"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Force a full rebuild (the vendored files are incremental `file` recipes),
      # then compare against the committed copy.
      - name: Rebuild the embedded web runtime from source
        run: |
          rm -rf crates/sema/src/web/assets
          jake wasm.web-runtime

      - name: Fail if the committed runtime drifted from source
        run: |
          drift=0
          if ! git diff --quiet -- crates/sema/src/web/assets; then drift=1; fi
          if [ -n "$(git ls-files --others --exclude-standard crates/sema/src/web/assets)" ]; then drift=1; fi
          if [ "$drift" = 1 ]; then
            echo "::error::Embedded web runtime is stale. Run 'jake wasm.web-runtime' and commit crates/sema/src/web/assets/."
            git --no-pager status --porcelain -- crates/sema/src/web/assets
            git --no-pager diff --stat -- crates/sema/src/web/assets
            exit 1
          fi
          echo "embedded web runtime matches source ✓"
