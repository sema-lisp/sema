<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Board — Sema Web Demo</title>
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f1f2f4;
      color: #172b4d;
    }
    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #5e6c84;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c1c7d0; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #a5adba; }

    select option { color: #172b4d; background: #fff; }
  </style>
</head>
<body>
  <div id="app">Loading board...</div>
  <div id="card-modal"></div>

  <script type="text/sema" src="board.sema"></script>
  <script type="module" src="board-init.ts"></script>
</body>
</html>
