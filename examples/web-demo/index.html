<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sema AI Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a; color: #e5e5e5;
      display: flex; justify-content: center; padding: 2rem;
    }
    .chat-container {
      max-width: 640px; width: 100%;
    }
    h2 {
      font-size: 1.25rem; font-weight: 600;
      margin-bottom: 1rem; color: #fafafa;
    }
    .messages {
      min-height: 300px; max-height: 60vh;
      overflow-y: auto; margin-bottom: 1rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .message {
      padding: 0.75rem 1rem; border-radius: 8px;
      line-height: 1.5; font-size: 0.9rem;
    }
    .message.user {
      background: #1a1a2e; border: 1px solid #2a2a4a;
    }
    .message.assistant {
      background: #1a2e1a; border: 1px solid #2a4a2a;
    }
    .message.streaming {
      border-color: #4a6a4a;
    }
    .message strong {
      font-size: 0.75rem; text-transform: uppercase;
      letter-spacing: 0.05em; opacity: 0.6;
      display: block; margin-bottom: 0.25rem;
    }
    .input-area {
      display: flex; gap: 0.5rem;
    }
    .input-area input {
      flex: 1; padding: 0.75rem 1rem;
      background: #1a1a1a; border: 1px solid #333;
      border-radius: 8px; color: #e5e5e5;
      font-size: 0.9rem; outline: none;
    }
    .input-area input:focus { border-color: #555; }
    .input-area button {
      padding: 0.75rem 1.5rem;
      background: #2563eb; border: none;
      border-radius: 8px; color: white;
      font-size: 0.9rem; font-weight: 500;
      cursor: pointer;
    }
    .input-area button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div id="app">Loading Sema...</div>

  <script type="text/sema" src="chat.sema"></script>
  <script type="module" src="init.ts"></script>
</body>
</html>
